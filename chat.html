<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Human Messenger</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #050505; overflow: hidden; }
        .container { display: flex; height: 100vh; max-width: 100vw; }
        
        /* Sidebar Navigation */
        .sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; }
        .sidebar header { padding: 14px; border-bottom: 1px solid #ddd; text-align: center; background-color: #1877f2; color: white; }
        
        /* Profile Identifier (Sano & Clean) */
        .me-badge { font-size: 13px; background: rgba(255, 255, 255, 0.2); padding: 4px 10px; border-radius: 12px; display: inline-block; font-weight: 600; margin-top: 4px; }
        .sidebar h2 { font-size: 18px; font-weight: 700; }
        
        /* Contacts Layout & Touch Area Fix */
        .contacts-list { flex: 1; overflow-y: auto; pointer-events: auto; }
        .contact { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s ease; pointer-events: auto; }
        .contact:hover { background-color: #f0f2f5; }
        .contact.active { border-left: 4px solid #1877f2; background-color: #e7f3ff; }
        .contact-name { font-weight: 600; font-size: 15px; color: #050505; pointer-events: none; }
        
        /* Messaging Display Frame */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: white; z-index: 5; }
        .chat-header { padding: 16px; border-bottom: 1px solid #ddd; font-weight: 700; font-size: 17px; background-color: #f5f6f7; }
        .messages { flex: 1; padding: 16px; overflow-y: auto; background: #e5ddd5; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .message.sent { align-self: flex-end; background-color: #1877f2; color: white; border-bottom-right-radius: 4px; }
        .message.received { align-self: flex-start; background-color: white; border-bottom-left-radius: 4px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        
        /* Form Box Fields */
        .input-wrapper { padding: 8px; border-top: 1px solid #ddd; background-color: #f0f2f5; }
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex: 1; padding: 10px 14px; border-radius: 20px; border: none; font-size: 15px; outline: none; background-color: white; }
        .input-area button { background-color: #1877f2; border: none; color: white; padding: 0 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }
        
        /* Mobile Dynamic Touch Adaptations */
        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #ddd; }
            .sidebar header { padding: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
            .sidebar h2 { font-size: 16px; }
            .me-badge { margin-top: 0; font-size: 11px; padding: 2px 8px; }
            
            /* Horizontal Touch Scroller Setup */
            .contacts-list { display: flex; flex-direction: row; width: 100%; overflow-x: auto; padding: 8px; gap: 8px; background: #fff; -webkit-overflow-scrolling: touch; }
            .contact { padding: 8px 14px; border-radius: 20px; background: #f0f2f5; border: 1px solid #e4e6eb; min-width: max-content; border-bottom: none; }
            .contact.active { border: 1px solid #1877f2; background-color: #e7f3ff; }
            .contact-name { font-size: 13px; }
            
            .chat-area { height: calc(100vh - 115px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <header>
                <h2>Messenger</h2>
                <div class="me-badge" id="myBadge">Me: Loading...</div>
            </header>
            <div class="contacts-list" id="contactsList">
                <div class="contact" onclick="selectContact('Anil Thapa')"><div class="contact-name">Anil Thapa</div></div>
                <div class="contact" onclick="selectContact('Sita Ram')"><div class="contact-name">Sita Ram</div></div>
                <div class="contact" onclick="selectContact('Maya Sharma')"><div class="contact-name">Maya Sharma</div></div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header" id="chatHeader">Select a contact to chat</div>
            <div class="messages" id="messagesContainer"></div>
            <div class="input-wrapper">
                <form id="messageForm" class="input-area" style="display:none;" onsubmit="sendMessage(event)">
                    <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" />
                    <button type="submit">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        // User define garne query parameters logic
        const myName = urlParams.get('me') || "User_" + Math.floor(Math.random() * 1000);
        document.getElementById('myBadge').innerText = "Me: " + myName;

        let activeContact = null;
        let pollingInterval = null;

        function selectContact(name) {
            activeContact = name;
            
            // Highlight selector mechanism
            document.querySelectorAll('.contact').forEach(el => {
                if(el.innerText.trim() === name) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });

            document.getElementById('chatHeader').innerText = "Chat with " + activeContact;
            document.getElementById('messageForm').style.display = 'flex';
            
            fetchMessages();
            
            // InfinityFree safe interval rate (3 seconds loop)
            if(pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(fetchMessages, 3000);
        }

        function fetchMessages() {
            if (!activeContact) return;
            
            fetch(`send_msg.php?action=fetch&user1=${encodeURIComponent(myName)}&user2=${encodeURIComponent(activeContact)}`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('messagesContainer');
                    container.innerHTML = '';
                    
                    if(data.length === 0) {
                        container.innerHTML = '<div style="text-align:center; padding:20px; color:#65676b; font-size:13px;">No messages yet. Say Hello!</div>';
                        return;
                    }

                    data.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = 'message ' + msg.type;
                        div.innerText = msg.text;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                })
                .catch(err => console.log("Polling failure log:", err));
        }

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !activeContact) return;

            const formData = new FormData();
            formData.append('sender', myName);
            formData.append('receiver', activeContact);
            formData.append('message', text);

            fetch('send_msg.php?action=send', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    input.value = '';
                    fetchMessages(); // Refresh conversation line instantly
                }
            });
        }
    </script>
</body>
</html>
