<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Feed</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 50px; }
        .nav { background: white; padding: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .back-btn { text-decoration: none; margin-right: 15px; font-size: 1.5rem; color: #1877f2; }
        .container { max-width: 500px; margin: 15px auto; padding: 0 10px; }
        
        .create-post { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; display: flex; gap: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .create-post input { flex: 1; border: none; background: #f0f2f5; padding: 12px; border-radius: 20px; outline: none; }
        .post-btn { background: #1877f2; color: white; border: none; padding: 5px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .post { background: white; border-radius: 10px; padding: 15px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-info b { color: #1c1e21; }
        .post-time { font-size: 0.75rem; color: #65676b; display: block; }
        
        .actions { display: flex; gap: 15px; border-top: 1px solid #f0f2f5; padding-top: 10px; margin-top: 10px; }
        .action-btn { cursor: pointer; color: #65676b; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; background: none; border: none; }
        .action-btn.active { color: #1877f2; font-weight: bold; }
        
        .edit-del-btns button { background: none; border: none; font-size: 0.8rem; cursor: pointer; margin-left: 5px; padding: 5px; }
        .edit-btn { color: #1877f2; }
        .delete-btn { color: #f44336; }
    </style>
</head>
<body>

<div class="nav">
    <a href="group.html" class="back-btn">‹</a> 
    <b id="title">Loading Group...</b>
</div>

<div class="container">
    <div class="create-post">
        <input type="text" id="postInput" placeholder="Share something with the group...">
        <button class="post-btn" onclick="sendPost()">Post</button>
    </div>
    <div id="post-list"></div>
</div>

<script>
    // --- 1. CONFIGURATION & VARIABLES (Move these to the top!) ---
    const CURRENT_USER_ID = "User_123"; // Logic: This simulates the logged-in user
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get('id');
    const groupName = params.get('name');

    // Display Group Name
    if (groupName) {
        document.getElementById('title').innerText = decodeURIComponent(groupName);
    }

    // --- 2. CORE FUNCTIONS ---

    function loadPosts() {
        const allPosts = JSON.parse(localStorage.getItem('app_posts')) || [];
        const filtered = allPosts.filter(p => p.groupId === groupId);
        const list = document.getElementById('post-list');
        
        if (filtered.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:gray; margin-top: 20px;">No posts here yet. Be the first!</p>';
            return;
        }

        list.innerHTML = filtered.map(p => {
            const isOwner = p.authorId === CURRENT_USER_ID;
            const hasLiked = p.likedBy && p.likedBy.includes(CURRENT_USER_ID);
            
            // Time logic
            const seconds = Math.floor((Date.now() - p.time) / 1000);
            let timeStr = "Just now";
            if (seconds > 60) timeStr = Math.floor(seconds / 60) + "m ago";
            if (seconds > 3600) timeStr = Math.floor(seconds / 3600) + "h ago";

            return `
                <div class="post">
                    <div class="post-header">
                        <div class="user-info">
                            <b>${p.authorName || "Anonymous"}</b>
                            <span class="post-time">${timeStr}</span>
                        </div>
                        ${isOwner ? `
                            <div class="edit-del-btns">
                                <button class="edit-btn" onclick="editPost('${p.id}')">Edit</button>
                                <button class="delete-btn" onclick="deletePost('${p.id}')">Delete</button>
                            </div>
                        ` : ''}
                    </div>
                    <div class="post-content">${p.text}</div>
                    
                    <div class="actions">
                        <button class="action-btn ${hasLiked ? 'active' : ''}" onclick="toggleLike('${p.id}')">
                            ${hasLiked ? '❤️' : '🤍'} ${p.likes || 0}
                        </button>
                        <button class="action-btn" onclick="addComment('${p.id}')">
                            💬 ${p.comments ? p.comments.length : 0}
                        </button>
                        <button class="action-btn" onclick="sharePost()">
                            🔗 Share
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function sendPost() {
        const input = document.getElementById('postInput');
        const text = input.value.trim();
        if (!text) return;

        const allPosts = JSON.parse(localStorage.getItem('app_posts')) || [];
        const newPost = {
            id: 'post-' + Date.now(),
            groupId: groupId,
            authorId: CURRENT_USER_ID,
            authorName: "You",
            text: text,
            time: Date.now(),
            likes: 0,
            likedBy: [],
            comments: []
        };

        allPosts.unshift(newPost);
        localStorage.setItem('app_posts', JSON.stringify(allPosts));
        input.value = '';
        loadPosts();
    }

    function toggleLike(postId) {
        let allPosts = JSON.parse(localStorage.getItem('app_posts')) || [];
        const post = allPosts.find(p => p.id === postId);
        if (!post) return;

        if (!post.likedBy) post.likedBy = [];
        
        if (post.likedBy.includes(CURRENT_USER_ID)) {
            post.likedBy = post.likedBy.filter(id => id !== CURRENT_USER_ID);
            post.likes = Math.max(0, post.likes - 1);
        } else {
            post.likedBy.push(CURRENT_USER_ID);
            post.likes = (post.likes || 0) + 1;
        }

        localStorage.setItem('app_posts', JSON.stringify(allPosts));
        loadPosts();
    }

    function editPost(postId) {
        let allPosts = JSON.parse(localStorage.getItem('app_posts')) || [];
        const post = allPosts.find(p => p.id === postId);
        if (!post || post.authorId !== CURRENT_USER_ID) return;

        const newText = prompt("Edit your post:", post.text);
        if (newText !== null && newText.trim() !== "") {
            post.text = newText;
            localStorage.setItem('app_posts', JSON.stringify(allPosts));
            loadPosts();
        }
    }

    function deletePost(postId) {
        if (!confirm("Delete this post permanently?")) return;
        let allPosts = JSON.parse(localStorage.getItem('app_posts')) || [];
        allPosts = allPosts.filter(p => p.id !== postId);
        localStorage.setItem('app_posts', JSON.stringify(allPosts));
        loadPosts();
    }

    function addComment(postId) {
        const comment = prompt("Enter your comment:");
        if (!comment) return;

        let allPosts = JSON.parse(localStorage.getItem('app_posts')) || [];
        const post = allPosts.find(p => p.id === postId);
        if (post) {
            if (!post.comments) post.comments = [];
            post.comments.push({ text: comment, time: Date.now() });
            localStorage.setItem('app_posts', JSON.stringify(allPosts));
            loadPosts();
        }
    }

    function sharePost() {
        alert("Link copied to clipboard!");
    }

    // --- 3. INITIAL LOAD ---
    window.onload = loadPosts;

</script>
</body>
</html>
