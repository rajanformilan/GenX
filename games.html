<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samaya Game Hub</title>
    <style>
        body { 
            margin: 0; 
            background: #0a0a0a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        /* Top Bar */
        #top-bar {
            width: 100%;
            padding: 20px;
            background: #111;
            border-bottom: 2px solid #00ffcc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .balance-box {
            background: rgba(0, 255, 204, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #00ffcc;
            font-weight: bold;
            color: #ffcc00;
        }

        h1 { margin: 40px 0 10px 0; font-size: 28px; letter-spacing: 2px; text-transform: uppercase; }
        p { color: #888; margin-bottom: 40px; }

        /* Game Grid */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            width: 90%;
            max-width: 500px;
        }

        .game-card {
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .game-card:active { transform: scale(0.95); border-color: #00ffcc; }

        .banner {
            height: 120px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 15px;
            background-blend-mode: overlay;
        }

        .gta-bg { background: linear-gradient(to top, #000, transparent), #444; }
        .slots-bg { background: linear-gradient(to top, #000, transparent), #8a0000; }

        .card-info { padding: 15px; }
        .card-title { font-size: 20px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .card-desc { font-size: 13px; color: #aaa; }

        .tag {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }


        .banner {
    position: relative;
    overflow: hidden;
    height: 150px; /* Adjust height as needed */
}

.banner-img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* This prevents the image from stretching */
    display: block;
}

/* Keeps the title on top of the image */
.card-title {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 2;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

        .tag-action { background: #ff3e3e; }
        .tag-lucky { background: #ffcc00; color: #000; }

        /* Footer */
        footer { margin-top: auto; padding: 30px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

<div id="top-bar">
    <div style="font-weight: bold; font-size: 18px; color: #00ffcc;">SAMAYA <span style="color:#fff">OS</span></div>
    <div class="balance-box">© <span id="totalCoins">0</span></div>
</div>

<h1>Select Mission</h1>
<p>Choose your way to earn coins</p>

<div class="game-grid">
    <a href="venicegamevast.html" class="game-card">
<div class="banner">
    <img src="91-nsVNGd1L.jpg" alt="GTA-FF Mobile" class="banner-img">
</div>
        <span class="tag tag-action">Combat</span>
        <div class="banner gta-bg">
            <div class="card-title">GTA-FF Mobile</div>
        </div>
        <div class="card-info">
            <div class="card-desc">Free roam simulation. Eliminate targets and survive the wanted level.</div>
        </div>
    </a>

    <a href="slots.html" class="game-card">
        <div class="banner">
    <img src="images (1).jpeg" alt="Lucky Slots" class="banner-img">
        </div>
        <span class="tag tag-lucky">Casino</span>
        <div class="banner slots-bg">
            <div class="card-title">Lucky Slots</div>
        </div>
        <div class="card-info">
            <div class="card-desc">High-stakes reward system. Spin to win up to 12,000x multipliers.</div>
        </div>
    </a>
</div>

<footer>Powered by Samaya Human AI</footer>

<script>
    // Pull shared balance from local storage
    const coins = localStorage.getItem('lucky_coins') || localStorage.getItem('sim_cash') || 0;
    document.getElementById('totalCoins').innerText = parseInt(coins).toLocaleString();

    // Subtle vibration on card tap
    document.querySelectorAll('.game-card').forEach(card => {
        card.addEventListener('click', () => {
            if(navigator.vibrate) navigator.vibrate(40);
        });
    });
</script>

</body>
</html>
